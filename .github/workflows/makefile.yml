name: makefile

on: push

defaults:
  run:
    working-directory: app


jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - run: make run-dist
      - run: make help
      - run: make build
